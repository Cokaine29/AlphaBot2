<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaBot2 Graph Engine V4</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #070512 0%, #0d0921 50%, #030107 100%);
            --glass-bg: rgba(255, 255, 255, 0.025);
            --glass-border: rgba(255, 255, 255, 0.07);
            --glass-border-focus: rgba(255, 255, 255, 0.18);
            --primary: #8a2be2;
            --primary-glow: rgba(138, 43, 226, 0.4);
            --success: #00e676;
            --success-glow: rgba(0, 230, 118, 0.4);
            --warning: #ff8c00;
            --danger: #ff1744;
            --text-main: #f3efff;
            --text-muted: #8e85a2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        body::before, body::after {
            content: ''; position: absolute; width: 300px; height: 300px;
            border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.25;
        }
        body::before { top: 10%; left: 10%; background: var(--primary); }
        body::after { bottom: 10%; right: 10%; background: #00d2ff; }

        .container {
            width: 100%; max-width: 420px; z-index: 1;
            display: grid; gap: 20px;
            grid-template-areas: 
                "header"
                "conn"
                "minimap"
                "actions"
                "terminal";
        }
        header { grid-area: header; text-align: center; margin-bottom: 5px; }
        .card-conn { grid-area: conn; }
        .card-minimap { grid-area: minimap; }
        .card-actions { grid-area: actions; }
        .card-terminal { grid-area: terminal; }

        @media (min-width: 850px) {
            .container {
                max-width: 900px;
                grid-template-columns: 350px 1fr;
                grid-template-areas: 
                    "header header"
                    "conn minimap"
                    "actions minimap"
                    "terminal minimap";
                align-items: start;
            }
            .card-minimap {
                display: flex; flex-direction: column; height: 100%;
            }
            .canvas-container {
                aspect-ratio: auto !important; flex: 1; height: 100%; min-height: 400px;
            }
            .console-terminal {
                height: 150px !important;
            }
        }
        h1 {
            font-size: 2.2rem; font-weight: 800; letter-spacing: 1px;
            background: linear-gradient(90deg, #b388ff, #ea80fc, #82b1ff);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
        p.subtitle { font-size: 0.9rem; color: var(--text-muted); margin-top: 5px; text-transform: uppercase; }

        .card {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 24px; backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4); display: flex; flex-direction: column; gap: 18px;
        }

        .conn-bar { display: flex; justify-content: space-between; align-items: center; }
        .status-indicator { display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background-color: var(--danger); box-shadow: 0 0 10px var(--danger); }
        .dot.connected { background-color: var(--success); box-shadow: 0 0 10px var(--success); }

        .btn {
            background: linear-gradient(135deg, #8a2be2 0%, #4a148c 100%);
            border: none; border-radius: 16px; color: white; padding: 12px 20px;
            font-weight: 600; cursor: pointer; display: flex; gap: 8px; box-shadow: 0 4px 15px var(--primary-glow);
        }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .action-layout { display: flex; flex-direction: column; gap: 14px; }
        .ctrl-btn {
            padding: 14px; font-size: 1.05rem; font-weight: 700; border-radius: 18px; cursor: pointer;
            border: 1px solid var(--glass-border); color: var(--text-main); background: rgba(255, 255, 255, 0.02);
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .panel-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 5px; }

        .canvas-container {
            width: 100%; aspect-ratio: 1; background: rgba(0, 0, 0, 0.6);
            border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            position: relative;
        }
        canvas { width: 100%; height: 100%; }

        .console-terminal {
            background: rgba(0, 0, 0, 0.4); border-radius: 16px; height: 80px; padding: 12px;
            overflow-y: auto; font-size: 0.8rem; font-family: 'JetBrains Mono', monospace; display: flex; flex-direction: column; gap: 4px;
        }
        .console-line { color: var(--text-muted); }
        .console-line.tx { color: #00e5ff; }
        .console-line.rx { color: #00e676; }
        .console-line.error { color: var(--danger); }

        .toast-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .toast { background: rgba(0, 0, 0, 0.8); border: 1px solid var(--glass-border); border-radius: 12px; padding: 16px; color: white; transform: translateX(120%); transition: transform 0.3s; }
        .toast.show { transform: translateX(0); }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>ALPHABOT2 V4</h1>
        <p class="subtitle">DFS Tree Traversals</p>
    </header>

    <div class="card card-conn">
        <div class="conn-bar">
            <div class="status-indicator">
                <div class="dot" id="connDot"></div>
                <span id="connStatusText">Disconnected</span>
            </div>
            <button class="btn" id="connectBtn">Connect Bot</button>
        </div>
    </div>

    <div class="card card-minimap">
        <h3 class="panel-title">Topological Minimap</h3>
        <div class="canvas-container">
            <canvas id="minimapCanvas" width="400" height="400"></canvas>
        </div>
    </div>

    <div class="card card-actions">
        <div class="action-layout">
            <button class="ctrl-btn" id="btnCalibrate" disabled>🎯 Calibrate Sensors</button>
            <button class="ctrl-btn" id="btnLearn" disabled>🚀 Start Full Maze Mapping</button>
            <button class="ctrl-btn" id="btnPre" disabled>🌿 Pre-Order Traversal</button>
            <button class="ctrl-btn" id="btnIn" disabled>🌳 In-Order Traversal</button>
            <button class="ctrl-btn" id="btnPost" disabled>🍂 Post-Order Traversal</button>
            <button class="ctrl-btn" id="btnHorn" disabled>📢 HORN BUZZER</button>
        </div>
    </div>

    <div class="card card-terminal">
        <div class="console-terminal" id="terminalLog"></div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
    // --- GRAPH ENGINE UI ---
    let nodes = {}; 
    let edges = []; 
    let botNode = 0;
    let visitedNodes = new Set();
    let minX = 0, maxX = 0, minY = 0, maxY = 0;

    const canvas = document.getElementById('minimapCanvas');
    const ctx = canvas.getContext('2d');

    function resetGraph() {
        nodes = {}; edges = []; botNode = 0; visitedNodes.clear();
        minX = 0; maxX = 0; minY = 0; maxY = 0;
        renderMinimap();
    }

    function updateBounds(x, y) {
        if (Object.keys(nodes).length === 1) { minX = maxX = x; minY = maxY = y; return; }
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
    }

    function renderMinimap() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if(Object.keys(nodes).length === 0) return;

        let gridW = Math.max(2, maxX - minX);
        let gridH = Math.max(2, maxY - minY);
        
        let pad = 40;
        let scaleX = (canvas.width - pad * 2) / gridW;
        let scaleY = (canvas.height - pad * 2) / gridH;
        let scale = Math.min(scaleX, scaleY);
        
        let offsetX = pad + ((canvas.width - pad*2) - (gridW * scale)) / 2 - (minX * scale);
        let offsetY = pad + ((canvas.height - pad*2) - (gridH * scale)) / 2 - (minY * scale);
        
        // Reverse Y so positive Y goes up like a standard graph
        function getScreenXY(nx, ny) {
            return { x: offsetX + nx * scale, y: canvas.height - (offsetY + ny * scale) };
        }
        
        // Draw Edges
        ctx.lineWidth = 4;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
        edges.forEach(e => {
            let n1 = nodes[e.n1]; let n2 = nodes[e.n2];
            if(!n1 || !n2) return;
            let p1 = getScreenXY(n1.x, n1.y); let p2 = getScreenXY(n2.x, n2.y);
            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
        });
        
        // Draw Nodes
        for (const [id, n] of Object.entries(nodes)) {
            let p = getScreenXY(n.x, n.y);
            ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, 2*Math.PI);
            
            if (id == 0) {
                ctx.fillStyle = "#8a2be2"; // Start Node
            } else if (visitedNodes.has(parseInt(id))) {
                ctx.fillStyle = "#ff00ff"; // Visited Node Magenta
            } else {
                ctx.fillStyle = "rgba(255,255,255,0.8)";
            }
            
            ctx.fill();
            if (visitedNodes.has(parseInt(id))) {
                ctx.lineWidth = 2; ctx.strokeStyle = "#ff80ff"; ctx.stroke();
            }
        }
        
        // Draw Bot
        if(nodes[botNode]) {
            let p = getScreenXY(nodes[botNode].x, nodes[botNode].y);
            ctx.beginPath(); ctx.arc(p.x, p.y, 14, 0, 2*Math.PI);
            ctx.fillStyle = "rgba(0, 230, 118, 0.4)"; ctx.fill();
            ctx.lineWidth = 2; ctx.strokeStyle = "#00e676"; ctx.stroke();
        }
    }

    // --- BLE ENGINE ---
    const SERVICE_UUID = '0000ffe0-0000-1000-8000-00805f9b34fb';
    const CHAR_UUID    = '0000ffe1-0000-1000-8000-00805f9b34fb';
    let bleDevice = null; let txCharacteristic = null; let rxCharacteristic = null; let isConnected = false;

    const connectBtn = document.getElementById('connectBtn');
    const connDot = document.getElementById('connDot');
    const connStatusText = document.getElementById('connStatusText');
    const terminalLog = document.getElementById('terminalLog');
    const btnCalibrate = document.getElementById('btnCalibrate');
    const btnLearn = document.getElementById('btnLearn');
    const btnPre = document.getElementById('btnPre');
    const btnIn = document.getElementById('btnIn');
    const btnPost = document.getElementById('btnPost');
    const btnHorn = document.getElementById('btnHorn');

    function logToTerminal(msg, type = 'info') {
        const line = document.createElement('div');
        line.className = `console-line ${type}`;
        line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        terminalLog.appendChild(line);
        terminalLog.scrollTop = terminalLog.scrollHeight;
    }

    function showToast(msg, type = 'info') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<span>${type === 'success' ? '✅' : '❌'}</span><span>${msg}</span>`;
        document.getElementById('toastContainer').appendChild(toast);
        void toast.offsetWidth; toast.classList.add('show');
        setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 5000);
    }

    connectBtn.addEventListener('click', async () => {
        if (isConnected) { bleDevice.gatt.disconnect(); return; }
        try {
            bleDevice = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: [SERVICE_UUID] });
            const server = await bleDevice.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            txCharacteristic = await service.getCharacteristic(CHAR_UUID);
            rxCharacteristic = txCharacteristic;
            
            isConnected = true;
            connDot.className = 'dot connected'; connStatusText.textContent = `Connected`;
            connectBtn.textContent = 'Disconnect';
            btnCalibrate.disabled = false; btnLearn.disabled = false; btnPre.disabled = false; btnIn.disabled = false; btnPost.disabled = false; btnHorn.disabled = false;
            
            bleDevice.addEventListener('gattserverdisconnected', () => {
                isConnected = false; connDot.className = 'dot'; connStatusText.textContent = 'Disconnected';
                connectBtn.textContent = 'Connect Bot';
                btnCalibrate.disabled = true; btnLearn.disabled = true; btnPre.disabled = true; btnIn.disabled = true; btnPost.disabled = true; btnHorn.disabled = true;
            });

            let rxBuffer = '';
            await rxCharacteristic.startNotifications();
            rxCharacteristic.addEventListener('characteristicvaluechanged', (e) => {
                const text = new TextDecoder().decode(e.target.value);
                rxBuffer += text;
                let lines = rxBuffer.split('\n');
                rxBuffer = lines.pop(); 
                
                for (let line of lines) {
                    line = line.trim();
                    if (!line) continue;
                    
                    if (line.startsWith("NODE:")) {
                        let parts = line.substring(5).split(',');
                        nodes[parts[0]] = {x: parseInt(parts[1]), y: parseInt(parts[2])};
                        updateBounds(parseInt(parts[1]), parseInt(parts[2]));
                        renderMinimap();
                    } else if (line.startsWith("EDGE:")) {
                        let parts = line.substring(5).split(',');
                        edges.push({n1: parseInt(parts[0]), n2: parseInt(parts[1])});
                        renderMinimap();
                    } else if (line.startsWith("BOT:")) {
                        botNode = parseInt(line.substring(4));
                        renderMinimap();
                    } else if (line.startsWith("VISIT:")) {
                        let id = parseInt(line.substring(6));
                        showToast(`Visited Node ${id}!`, "success");
                        visitedNodes.add(id);
                        renderMinimap();
                    } else if (line.includes("Maze Mapped!")) {
                        showToast("Maze completely mapped! Ready for traversals.", "success");
                    } else {
                        logToTerminal(`RX: ${line}`, 'rx');
                    }
                }
            });
        } catch (e) { logToTerminal(e.message, 'error'); }
    });

    let isSending = false; let sendQueue = [];
    async function processQueue() {
        if (isSending || !sendQueue.length) return;
        isSending = true;
        while (sendQueue.length > 0) {
            const { packet, resolve } = sendQueue.shift();
            const packetStr = JSON.stringify(packet) + '\n';
            try {
                await txCharacteristic.writeValue(new TextEncoder().encode(packetStr));
                logToTerminal(`TX: ${packetStr.trim()}`, 'tx');
                resolve();
            } catch(e) {}
        }
        isSending = false;
    }
    function sendCommand(packet) { return new Promise(r => { sendQueue.push({packet, resolve: r}); processQueue(); }); }

    btnCalibrate.addEventListener('click', () => sendCommand({ Calibrate: "Start" }));
    btnLearn.addEventListener('click', () => { resetGraph(); sendCommand({ Maze: "Learn" }); });
    btnPre.addEventListener('click', () => { visitedNodes.clear(); renderMinimap(); sendCommand({ Traversal: "Pre" }); });
    btnIn.addEventListener('click', () => { visitedNodes.clear(); renderMinimap(); sendCommand({ Traversal: "In" }); });
    btnPost.addEventListener('click', () => { visitedNodes.clear(); renderMinimap(); sendCommand({ Traversal: "Post" }); });
    
    // Horn controls
    function setHornState(state) { sendCommand({ BZ: state ? "on" : "off" }); }
    const startHorn = (e) => { e.preventDefault(); setHornState(true); };
    const stopHorn = (e) => { e.preventDefault(); setHornState(false); };
    
    btnHorn.addEventListener('mousedown', startHorn);
    btnHorn.addEventListener('touchstart', startHorn, {passive: false});
    btnHorn.addEventListener('mouseup', stopHorn);
    btnHorn.addEventListener('mouseleave', stopHorn);
    btnHorn.addEventListener('touchend', stopHorn, {passive: false});
    
    // Init canvas
    renderMinimap();
</script>
</body>
</html>
