<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaBot2 Simple BLE Controller V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #070512 0%, #0d0921 50%, #030107 100%);
            --glass-bg: rgba(255, 255, 255, 0.025);
            --glass-border: rgba(255, 255, 255, 0.07);
            --glass-border-focus: rgba(255, 255, 255, 0.18);
            --primary: #8a2be2;
            --primary-glow: rgba(138, 43, 226, 0.4);
            --success: #00e676;
            --success-glow: rgba(0, 230, 118, 0.4);
            --warning: #ff8c00;
            --warning-glow: rgba(255, 140, 0, 0.4);
            --danger: #ff1744;
            --danger-glow: rgba(255, 23, 68, 0.4);
            --text-main: #f3efff;
            --text-muted: #8e85a2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Decorative background glow blobs */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.25;
        }

        body::before {
            top: 10%;
            left: 10%;
            background: var(--primary);
        }

        body::after {
            bottom: 10%;
            right: 10%;
            background: #00d2ff;
        }

        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 5px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #b388ff, #ea80fc, #82b1ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(234, 128, 252, 0.15);
        }

        p.subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Card panels */
        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .conn-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--danger);
            box-shadow: 0 0 10px var(--danger);
            animation: pulse-red 2.5s infinite;
        }

        .dot.connected {
            background-color: var(--success);
            box-shadow: 0 0 10px var(--success);
            animation: pulse-green 2.5s infinite;
        }

        .dot.connecting {
            background-color: #ffb300;
            box-shadow: 0 0 10px #ffb300;
            animation: pulse-orange 1s infinite;
        }

        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 23, 68, 0.6); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(255, 23, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 23, 68, 0); }
        }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.6); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(0, 230, 118, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 230, 118, 0); }
        }

        @keyframes pulse-orange {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 179, 0, 0.6); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(255, 179, 0, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 179, 0, 0); }
        }

        /* Buttons styling */
        .btn {
            background: linear-gradient(135deg, #8a2be2 0%, #4a148c 100%);
            border: none;
            border-radius: 16px;
            color: white;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px var(--primary-glow);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(138, 43, 226, 0.5);
        }

        .btn:active:not(:disabled) {
            transform: translateY(1px);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn.disconnect {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            box-shadow: none;
        }

        .btn.disconnect:hover {
            background: rgba(255, 23, 68, 0.1);
            border-color: rgba(255, 23, 68, 0.3);
            box-shadow: 0 4px 15px rgba(255, 23, 68, 0.15);
        }

        /* Actions layout */
        .action-layout {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .ctrl-btn {
            padding: 18px;
            font-size: 1.05rem;
            font-weight: 700;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            outline: none;
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .ctrl-btn:hover:not(:disabled) {
            border-color: var(--glass-border-focus);
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-2px);
        }

        .ctrl-btn:active:not(:disabled) {
            transform: translateY(1px);
        }

        .ctrl-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }

        .ctrl-btn.calibrate {
            background: rgba(41, 121, 255, 0.05);
            border-color: rgba(41, 121, 255, 0.2);
            color: #82b1ff;
        }
        .ctrl-btn.calibrate:hover:not(:disabled) {
            background: rgba(41, 121, 255, 0.12);
            border-color: rgba(41, 121, 255, 0.5);
            box-shadow: 0 4px 15px rgba(41, 121, 255, 0.15);
        }

        .ctrl-btn.learn {
            background: rgba(255, 140, 0, 0.05);
            border-color: rgba(255, 140, 0, 0.2);
            color: #ffd180;
        }
        .ctrl-btn.learn:hover:not(:disabled) {
            background: rgba(255, 140, 0, 0.12);
            border-color: rgba(255, 140, 0, 0.5);
            box-shadow: 0 4px 15px rgba(255, 140, 0, 0.15);
        }

        .ctrl-btn.solve {
            background: rgba(0, 230, 118, 0.05);
            border-color: rgba(0, 230, 118, 0.2);
            color: #69f0ae;
        }
        .ctrl-btn.solve:hover:not(:disabled) {
            background: rgba(0, 230, 118, 0.12);
            border-color: rgba(0, 230, 118, 0.5);
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.15);
        }

        .ctrl-btn.horn {
            background: rgba(255, 214, 0, 0.05);
            border-color: rgba(255, 214, 0, 0.2);
            color: #ffe57f;
        }
        .ctrl-btn.horn:hover:not(:disabled) {
            background: rgba(255, 214, 0, 0.12);
            border-color: rgba(255, 214, 0, 0.5);
            box-shadow: 0 4px 15px rgba(255, 214, 0, 0.15);
        }
        .ctrl-btn.horn.active {
            background: #ffd600;
            color: #070512;
            border-color: #ffd600;
            box-shadow: 0 0 20px rgba(255, 214, 0, 0.4);
        }

        /* Console log */
        .console-terminal {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            height: 100px;
            padding: 12px;
            overflow-y: auto;
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
        }

        .console-line {
            line-height: 1.3;
            color: var(--text-muted);
        }
        .console-line.tx { color: #00e5ff; }
        .console-line.rx { color: #00e676; }
        .console-line.error { color: var(--danger); }

        /* Memory Stack */
        .panel-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .stack-container {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            min-height: 80px;
            padding: 16px;
            display: flex;
            overflow-x: auto;
            gap: 10px;
            align-items: center;
            scroll-behavior: smooth;
        }
        
        .stack-container::-webkit-scrollbar {
            height: 6px;
        }
        .stack-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }

        .empty-stack-msg {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-style: italic;
            margin: auto;
        }

        .stack-item {
            width: 45px;
            height: 45px;
            flex-shrink: 0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .stack-item.turn-L { background: linear-gradient(135deg, #00b4db, #0083b0); }
        .stack-item.turn-R { background: linear-gradient(135deg, #f12711, #f5af19); }
        .stack-item.turn-S { background: linear-gradient(135deg, #56ab2f, #a8e063); }
        .stack-item.turn-B { background: linear-gradient(135deg, #8e2de2, #4a00e0); }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Toast Notification */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .toast {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px 20px;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }
        .toast.info { border-left: 4px solid #00e5ff; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>ALPHABOT2 V2</h1>
        <p class="subtitle">Smart BLE Controller</p>
    </header>

    <!-- Connection Panel -->
    <div class="card">
        <div class="conn-bar">
            <div class="status-indicator">
                <div class="dot" id="connDot"></div>
                <span id="connStatusText">Disconnected</span>
            </div>
            <button class="btn" id="connectBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                Connect Bot
            </button>
        </div>
    </div>

    <!-- Commands Panel -->
    <div class="card">
        <div class="action-layout">
            <button class="ctrl-btn calibrate" id="btnCalibrate" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg>
                Calibrate Sensors
            </button>
            <button class="ctrl-btn learn" id="btnLearn" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                Start Maze Solver
            </button>
            <button class="ctrl-btn solve" id="btnSolve" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                Run Shortest Path
            </button>
            <button class="ctrl-btn horn" id="btnHorn" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01"></path></svg>
                📢 HORN BUZZER
            </button>
        </div>
    </div>

    <!-- Memory Stack Panel -->
    <div class="card">
        <h3 class="panel-title">Path Stack Memory</h3>
        <div class="stack-container" id="pathStack">
            <div class="empty-stack-msg" id="emptyStackMsg">Stack is empty</div>
        </div>
    </div>

    <!-- Output Logger -->
    <div class="card">
        <div class="console-terminal" id="terminalLog">
            <div class="console-line">Ready. Connect your robot via Bluetooth to start controlling...</div>
        </div>
    </div>
</div>

<!-- Toast notifications container -->
<div class="toast-container" id="toastContainer"></div>

<script>
    const SERVICE_UUID = '0000ffe0-0000-1000-8000-00805f9b34fb';
    const CHAR_UUID    = '0000ffe1-0000-1000-8000-00805f9b34fb';

    const NORDIC_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const NORDIC_RX_CHAR_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
    const NORDIC_TX_CHAR_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

    let bleDevice = null;
    let txCharacteristic = null;
    let rxCharacteristic = null;
    let isConnected = false;

    // DOM Elements
    const connectBtn = document.getElementById('connectBtn');
    const connDot = document.getElementById('connDot');
    const connStatusText = document.getElementById('connStatusText');
    const terminalLog = document.getElementById('terminalLog');
    
    const btnCalibrate = document.getElementById('btnCalibrate');
    const btnLearn = document.getElementById('btnLearn');
    const btnSolve = document.getElementById('btnSolve');
    const btnHorn = document.getElementById('btnHorn');
    
    const pathStack = document.getElementById('pathStack');
    const emptyStackMsg = document.getElementById('emptyStackMsg');

    function renderPathStack(pathString) {
        pathStack.innerHTML = ''; // clear current items
        if (!pathString || pathString.length === 0) {
            pathStack.appendChild(emptyStackMsg);
            return;
        }

        for (let i = 0; i < pathString.length; i++) {
            const char = pathString[i];
            
            // Skip rendering the 'Straight' symbol as requested
            if (char === 'S') continue;

            const item = document.createElement('div');
            item.className = `stack-item turn-${char}`;
            
            if (char === 'L') {
                item.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>';
            } else if (char === 'R') {
                item.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>';
            } else if (char === 'S') {
                item.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>';
            } else if (char === 'B') {
                item.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/></svg>';
            }
            pathStack.appendChild(item);
        }
        pathStack.scrollLeft = pathStack.scrollWidth;
    }

    function logToTerminal(message, type = 'info') {
        const line = document.createElement('div');
        line.className = `console-line ${type}`;
        const timestamp = new Date().toLocaleTimeString();
        line.textContent = `[${timestamp}] ${message}`;
        terminalLog.appendChild(line);
        terminalLog.scrollTop = terminalLog.scrollHeight;
    }

    function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        
        let icon = '';
        if (type === 'success') icon = '✅ ';
        else if (type === 'error') icon = '❌ ';
        else icon = 'ℹ️ ';
        
        toast.innerHTML = `<span>${icon}</span><span>${message}</span>`;
        
        document.getElementById('toastContainer').appendChild(toast);
        
        // Trigger reflow for animation
        void toast.offsetWidth;
        toast.classList.add('show');
        
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        }, 5000); // 5 seconds duration
    }

    connectBtn.addEventListener('click', async () => {
        if (isConnected) {
            disconnectBLE();
            return;
        }

        logToTerminal('Scanning for Bluetooth devices...', 'info');
        connDot.className = 'dot connecting';
        connStatusText.textContent = 'Connecting...';

        try {
            bleDevice = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [SERVICE_UUID, NORDIC_SERVICE_UUID]
            });

            logToTerminal(`Connecting to ${bleDevice.name}...`, 'info');
            bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

            const server = await bleDevice.gatt.connect();
            logToTerminal('Connected. Accessing services...', 'info');

            // 1. Try HM-10 UART Service
            try {
                const service = await server.getPrimaryService(SERVICE_UUID);
                txCharacteristic = await service.getCharacteristic(CHAR_UUID);
                rxCharacteristic = txCharacteristic;
                logToTerminal('Connected via HM-10 UART.', 'rx');
                await startNotifications();
                setConnectedUI();
                return;
            } catch (e) {
                logToTerminal('HM-10 service not found, checking Nordic UART...', 'info');
            }

            // 2. Try Nordic UART Service
            try {
                const service = await server.getPrimaryService(NORDIC_SERVICE_UUID);
                txCharacteristic = await service.getCharacteristic(NORDIC_RX_CHAR_UUID);
                rxCharacteristic = await service.getCharacteristic(NORDIC_TX_CHAR_UUID);
                logToTerminal('Connected via Nordic UART.', 'rx');
                await startNotifications();
                setConnectedUI();
                return;
            } catch (e) {
                logToTerminal('Nordic UART service not found.', 'error');
            }

            throw new Error('Device does not support standard UART service.');
        } catch (error) {
            logToTerminal(`GATT Connection Error: ${error.message}`, 'error');
            resetDisconnectUI();
        }
    });

    let rxBuffer = '';

    async function startNotifications() {
        if (!rxCharacteristic) return;
        await rxCharacteristic.startNotifications();
        rxCharacteristic.addEventListener('characteristicvaluechanged', (e) => {
            const decoder = new TextDecoder();
            const text = decoder.decode(e.target.value);
            rxBuffer += text;

            let lines = rxBuffer.split('\n');
            rxBuffer = lines.pop(); // keep the last incomplete line in the buffer

            for (let line of lines) {
                line = line.trim();
                if (!line) continue;
                
                logToTerminal(`RX: ${line}`, 'rx');

                // Interpret specific bot messages for toast notifications
                if (line.startsWith("PATH:")) {
                    renderPathStack(line.substring(5));
                } else if (line.includes("No End Found!")) {
                    showToast("Maze completely explored, but no end point found!", "error");
                } else if (line.includes("End !!!")) {
                    showToast("Maze solved! Ready to run shortest path.", "success");
                }
            }
        });
    }

    function setConnectedUI() {
        isConnected = true;
        connDot.className = 'dot connected';
        connStatusText.textContent = `Connected (${bleDevice.name})`;
        connectBtn.textContent = 'Disconnect';
        connectBtn.className = 'btn disconnect';
        
        btnCalibrate.disabled = false;
        btnLearn.disabled = false;
        btnSolve.disabled = false;
        btnHorn.disabled = false;
    }

    function resetDisconnectUI() {
        isConnected = false;
        txCharacteristic = null;
        rxCharacteristic = null;
        bleDevice = null;
        
        connDot.className = 'dot';
        connStatusText.textContent = 'Disconnected';
        connectBtn.textContent = 'Connect Bot';
        connectBtn.className = 'btn';

        btnCalibrate.disabled = true;
        btnLearn.disabled = true;
        btnSolve.disabled = true;
        btnHorn.disabled = true;
    }

    function disconnectBLE() {
        if (bleDevice && bleDevice.gatt.connected) {
            logToTerminal('Disconnecting Bluetooth...', 'info');
            bleDevice.gatt.disconnect();
        } else {
            resetDisconnectUI();
        }
    }

    function onDisconnected() {
        logToTerminal('Bluetooth link severed.', 'error');
        resetDisconnectUI();
    }

    // Packet transmission
    let isSending = false;
    let sendQueue = [];

    async function processQueue() {
        if (isSending || sendQueue.length === 0) return;
        isSending = true;

        while (sendQueue.length > 0) {
            const { packet, resolve, reject } = sendQueue[0];
            const packetStr = JSON.stringify(packet) + '\n';

            if (!isConnected || !txCharacteristic) {
                sendQueue.shift();
                reject(new Error("Offline"));
                continue;
            }

            try {
                const encoder = new TextEncoder();
                const buffer = encoder.encode(packetStr);
                logToTerminal(`TX: ${packetStr.trim()}`, 'tx');
                await txCharacteristic.writeValue(buffer);
                sendQueue.shift();
                resolve();
            } catch (err) {
                logToTerminal(`TX Error: ${err.message}`, 'error');
                if (err.message.includes("GATT operation already in progress")) {
                    await new Promise(r => setTimeout(r, 50));
                } else {
                    sendQueue.shift();
                    reject(err);
                }
            }
        }
        isSending = false;
    }

    function sendCommand(packet) {
        return new Promise((resolve, reject) => {
            sendQueue.push({ packet, resolve, reject });
            processQueue();
        });
    }

    // Command listeners
    btnCalibrate.addEventListener('click', () => sendCommand({ Calibrate: "Start" }));
    btnLearn.addEventListener('click', () => {
        renderPathStack('');
        sendCommand({ Maze: "Learn" });
    });
    btnSolve.addEventListener('click', () => sendCommand({ Maze: "Solve" }));

    // Momentary Horn controls
    function setHornState(state) {
        sendCommand({ BZ: state ? "on" : "off" });
    }

    const startHorn = (e) => {
        e.preventDefault();
        btnHorn.classList.add('active');
        setHornState(true);
    };

    const stopHorn = (e) => {
        e.preventDefault();
        btnHorn.classList.remove('active');
        setHornState(false);
    };

    btnHorn.addEventListener('mousedown', startHorn);
    btnHorn.addEventListener('touchstart', startHorn, {passive: false});
    btnHorn.addEventListener('mouseup', stopHorn);
    btnHorn.addEventListener('mouseleave', stopHorn);
    btnHorn.addEventListener('touchend', stopHorn, {passive: false});

    // Keyboard bindings (KBD overrides)
    window.addEventListener('keydown', (e) => {
        if (e.code === 'KeyH' && isConnected) {
            e.preventDefault();
            if (!btnHorn.classList.contains('active')) {
                btnHorn.classList.add('active');
                setHornState(true);
            }
        }
    });

    window.addEventListener('keyup', (e) => {
        if (e.code === 'KeyH' && isConnected) {
            e.preventDefault();
            btnHorn.classList.remove('active');
            setHornState(false);
        }
    });
</script>
</body>
</html>
